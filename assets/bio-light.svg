<svg xmlns="http://www.w3.org/2000/svg" width="800" height="250" viewBox="0 0 800 250">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f4f0"/>
      <stop offset="100%" style="stop-color:#f0eae4"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5a7caa;stop-opacity:0.25"/>
      <stop offset="50%" style="stop-color:#8070a0;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#5a7caa;stop-opacity:0.25"/>
    </linearGradient>
    <linearGradient id="barGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5a7caa"/>
      <stop offset="100%" style="stop-color:#8070a0"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8070a0"/>
      <stop offset="100%" style="stop-color:#b08050"/>
    </linearGradient>
    <linearGradient id="heartbeatLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8070a0;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#8070a0;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#8070a0;stop-opacity:0"/>
    </linearGradient>
    <filter id="orbGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <g id="iconController">
      <rect x="-8" y="-4" width="16" height="9" rx="3" fill="none" stroke="#5a7caa" stroke-width="1.2"/>
      <circle cx="-3.5" cy="-0.5" r="1" fill="#5a7caa"/>
      <circle cx="3.5" cy="-0.5" r="1" fill="#8070a0"/>
      <line x1="-5" y1="5" x2="-3" y2="8" stroke="#5a7caa" stroke-width="1" stroke-linecap="round"/>
      <line x1="5" y1="5" x2="3" y2="8" stroke="#5a7caa" stroke-width="1" stroke-linecap="round"/>
    </g>
    <g id="iconPan">
      <ellipse cx="0" cy="0" rx="7" ry="3" fill="none" stroke="#b08050" stroke-width="1.2"/>
      <line x1="7" y1="0" x2="14" y2="-2" stroke="#b08050" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M-2,-4 C-2,-7 0,-6 0,-9" fill="none" stroke="#b08050" stroke-width="0.7" opacity="0.4">
        <animate attributeName="opacity" values="0.4;0.12;0.4" dur="2s" repeatCount="indefinite"/>
      </path>
      <path d="M2,-4 C2,-8 4,-6 4,-10" fill="none" stroke="#b08050" stroke-width="0.7" opacity="0.3">
        <animate attributeName="opacity" values="0.3;0.08;0.3" dur="2.3s" repeatCount="indefinite" begin="0.3s"/>
      </path>
    </g>
    <g id="iconHeadphones">
      <path d="M-7,2 C-7,-5 7,-5 7,2" fill="none" stroke="#8070a0" stroke-width="1.2"/>
      <rect x="-9" y="0" width="4" height="6" rx="1.5" fill="none" stroke="#8070a0" stroke-width="1"/>
      <rect x="5" y="0" width="4" height="6" rx="1.5" fill="none" stroke="#8070a0" stroke-width="1"/>
      <path d="M-1,1 C-0.5,-1 0.5,3 1,1" stroke="#8070a0" stroke-width="0.6" fill="none" opacity="0.3">
        <animate attributeName="opacity" values="0.3;0.1;0.3" dur="1.5s" repeatCount="indefinite"/>
      </path>
    </g>
    <g id="iconHeart">
      <path d="M0,3 C-3,0 -6,-2 -5,-5 C-4,-7 -1,-7 0,-4 C1,-7 4,-7 5,-5 C6,-2 3,0 0,3Z" fill="none" stroke="#c06070" stroke-width="1"/>
      <path d="M0,3 C-3,0 -6,-2 -5,-5 C-4,-7 -1,-7 0,-4 C1,-7 4,-7 5,-5 C6,-2 3,0 0,3Z" fill="#c06070" opacity="0.1">
        <animate attributeName="opacity" values="0.1;0.25;0.1" dur="1.2s" repeatCount="indefinite"/>
      </path>
    </g>
    <g id="iconMoon">
      <path d="M5.5,-4.3 A7,7 0 1,0 5.5,4.3 A5,5 0 0,0 5.5,-4.3Z" fill="none" stroke="#5a7caa" stroke-width="1.2" stroke-linejoin="round"/>
      <circle cx="-3" cy="-5" r="0.7" fill="#5a7caa" opacity="0.45">
        <animate attributeName="opacity" values="0.45;0.12;0.45" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-6" cy="1" r="0.5" fill="#5a7caa" opacity="0.35">
        <animate attributeName="opacity" values="0.35;0.08;0.35" dur="3s" repeatCount="indefinite" begin="0.7s"/>
      </circle>
    </g>
    <g id="iconCap">
      <polygon points="0,-5 10,0 0,3 -10,0" fill="none" stroke="#5a7caa" stroke-width="1"/>
      <line x1="0" y1="3" x2="0" y2="7" stroke="#5a7caa" stroke-width="0.8"/>
      <circle cx="0" cy="8" r="1" fill="#5a7caa" opacity="0.4"/>
    </g>
  </defs>

  <!-- Card background -->
  <rect x="10" y="10" width="780" height="230" rx="12" fill="url(#bgGrad)"/>
  <rect x="10" y="10" width="780" height="230" rx="12" fill="none" stroke="url(#borderGrad)" stroke-width="1"/>

  <!-- Corner ornaments -->
  <path d="M18,18 L18,34 M18,18 L34,18" stroke="#8070a0" stroke-width="1" opacity="0.18" stroke-linecap="round"/>
  <path d="M782,18 L782,34 M782,18 L766,18" stroke="#8070a0" stroke-width="1" opacity="0.18" stroke-linecap="round"/>
  <path d="M18,232 L18,216 M18,232 L34,232" stroke="#5a7caa" stroke-width="1" opacity="0.14" stroke-linecap="round"/>
  <path d="M782,232 L782,216 M782,232 L766,232" stroke="#5a7caa" stroke-width="1" opacity="0.14" stroke-linecap="round"/>

  <!-- Heartbeat line -->
  <path d="M30,125 L180,125 L190,110 L200,140 L210,115 L220,133 L230,125 L770,125" fill="none" stroke="url(#heartbeatLine)" stroke-width="0.8">
    <animate attributeName="stroke-dashoffset" values="0;-20" dur="2s" repeatCount="indefinite"/>
  </path>

  <!-- Row 1: Developer -->
  <use href="#iconController" x="42" y="51" filter="url(#iconGlow)"/>
  <text x="68" y="55" font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif" font-size="18" fill="#2a2a3a" opacity="0.9">Full-stack developer</text>
  <text x="762" y="55" text-anchor="end" font-family="'Fira Code', monospace" font-size="16" fill="#5a7caa" opacity="0.45">[ frontend · backend · repeat ]</text>

  <!-- Row 3: Cooking -->
  <use href="#iconPan" x="42" y="91" filter="url(#iconGlow)"/>
  <text x="68" y="95" font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif" font-size="18" fill="#4a4a60" opacity="0.75">Kitchen experimenter</text>
  <text x="762" y="95" text-anchor="end" font-family="'Fira Code', monospace" font-size="16" fill="#b08050" opacity="0.35">treats the kitchen like a lab</text>

  <line x1="40" y1="125" x2="760" y2="125" stroke="#8070a0" stroke-width="0.5" opacity="0.08"/>

  <!-- Row 4: Music -->
  <use href="#iconHeadphones" x="42" y="151" filter="url(#iconGlow)"/>
  <text x="68" y="155" font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif" font-size="18" fill="#5a5a70" opacity="0.7">Always listening</text>
  <g transform="translate(736, 145)">
    <rect x="0" y="2" width="3" height="8" rx="1" fill="#8070a0" opacity="0.3">
      <animate attributeName="height" values="8;4;10;6;8" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="2;4;1;3;2" dur="1.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="5" y="0" width="3" height="12" rx="1" fill="#5a7caa" opacity="0.3">
      <animate attributeName="height" values="12;6;14;8;12" dur="1.5s" repeatCount="indefinite" begin="0.1s"/>
      <animate attributeName="y" values="0;3;-1;2;0" dur="1.5s" repeatCount="indefinite" begin="0.1s"/>
    </rect>
    <rect x="10" y="3" width="3" height="6" rx="1" fill="#8070a0" opacity="0.3">
      <animate attributeName="height" values="6;10;4;8;6" dur="1.3s" repeatCount="indefinite" begin="0.2s"/>
      <animate attributeName="y" values="3;1;4;2;3" dur="1.3s" repeatCount="indefinite" begin="0.2s"/>
    </rect>
    <rect x="15" y="1" width="3" height="10" rx="1" fill="#5a7caa" opacity="0.3">
      <animate attributeName="height" values="10;4;12;6;10" dur="1.4s" repeatCount="indefinite" begin="0.15s"/>
      <animate attributeName="y" values="1;4;0;3;1" dur="1.4s" repeatCount="indefinite" begin="0.15s"/>
    </rect>
    <rect x="20" y="2" width="3" height="8" rx="1" fill="#8070a0" opacity="0.25">
      <animate attributeName="height" values="8;12;6;10;8" dur="1.1s" repeatCount="indefinite" begin="0.3s"/>
      <animate attributeName="y" values="2;0;3;1;2" dur="1.1s" repeatCount="indefinite" begin="0.3s"/>
    </rect>
  </g>
  <text x="762" y="155" text-anchor="end" font-family="'Fira Code', monospace" font-size="16" fill="#8070a0" opacity="0.35">Roselia · HOYO-MIX · Jay Chou</text>

  <!-- Row 5: Night owl -->
  <use href="#iconMoon" x="42" y="191" filter="url(#iconGlow)"/>
  <text x="68" y="195" font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif" font-size="18" fill="#3a4a60" opacity="0.7">Debugging past midnight</text>
  <text x="762" y="195" text-anchor="end" font-family="'Fira Code', monospace" font-size="16" fill="#5a7caa" opacity="0.4">git commit -m "fix: 3am edition"</text>

  <!-- Floating orbs -->
  <circle cx="750" cy="220" r="3" fill="#5a7caa" opacity="0" filter="url(#orbGlow)">
    <animate attributeName="opacity" values="0;0.12;0" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="220;214;220" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="720" cy="30" r="2.5" fill="#8070a0" opacity="0" filter="url(#orbGlow)">
    <animate attributeName="opacity" values="0;0.1;0" dur="7s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="cy" values="30;25;30" dur="7s" repeatCount="indefinite" begin="2s"/>
  </circle>
</svg>