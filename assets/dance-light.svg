<svg xmlns="http://www.w3.org/2000/svg" width="500" height="60" viewBox="0 0 500 60">
  <!-- All dancers share one outer group for synchronized horizontal movement -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="18,0; 0,0; -17,0; 0,0; 18,0"
      keyTimes="0; 0.25; 0.5; 0.75; 1"
      dur="4s" repeatCount="indefinite"/>

    <!-- Note 1 -->
    <text x="20" y="18" fill="#b85a15" font-size="18" font-family="sans-serif">♪
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-6; 0,0" dur="1.2s" repeatCount="indefinite"/>
    </text>

    <!-- Dancer 1 -->
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 0,-6; 0,0" dur="1s" repeatCount="indefinite"/>
      <text x="45" y="42" fill="#d4691a" font-family="monospace" font-size="28" font-weight="bold">┌|∵|┘
        <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.25;0.5;0.75;1" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
      </text>
      <text x="45" y="42" fill="#c45a10" font-family="monospace" font-size="28" font-weight="bold">└|∵|┐
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.25;0.5;0.75;1" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
      </text>
    </g>

    <!-- Note 2 -->
    <text x="185" y="13" fill="#e07020" font-size="16" font-family="sans-serif">♫
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="0.9s" begin="0.3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,2; 0,-8; 0,2" dur="1.8s" repeatCount="indefinite"/>
    </text>

    <!-- Dancer 2 -->
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 0,-6; 0,0" dur="1s" begin="0.25s" repeatCount="indefinite"/>
      <text x="205" y="42" fill="#d4691a" font-family="monospace" font-size="28" font-weight="bold">┌|∵|┘
        <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.25;0.5;0.75;1" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
      </text>
      <text x="205" y="42" fill="#c45a10" font-family="monospace" font-size="28" font-weight="bold">└|∵|┐
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.25;0.5;0.75;1" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
      </text>
    </g>

    <!-- Note 3 -->
    <text x="348" y="17" fill="#b85a15" font-size="15" font-family="sans-serif">♪
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-7; 0,0" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    </text>

    <!-- Dancer 3 -->
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 0,-6; 0,0" dur="1s" begin="0.5s" repeatCount="indefinite"/>
      <text x="365" y="42" fill="#d4691a" font-family="monospace" font-size="28" font-weight="bold">┌|∵|┘
        <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.25;0.5;0.75;1" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
      </text>
      <text x="365" y="42" fill="#c45a10" font-family="monospace" font-size="28" font-weight="bold">└|∵|┐
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.25;0.5;0.75;1" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
      </text>
    </g>
  </g>
</svg>
