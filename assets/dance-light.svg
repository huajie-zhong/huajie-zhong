<svg xmlns="http://www.w3.org/2000/svg" width="500" height="55" viewBox="0 0 500 55">
  <!-- All dancers share one outer group for synchronized horizontal movement -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="18,0; 0,0; -17,0; 0,0; 18,0"
      keyTimes="0; 0.25; 0.5; 0.75; 1"
      dur="4s" repeatCount="indefinite"/>

    <!-- Note 1 -->
    <text x="30" y="18" fill="#b85a15" font-size="16" font-family="sans-serif">♪
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-6; 0,0" dur="1.2s" repeatCount="indefinite"/>
    </text>

    <!-- Dancer 1 -->
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 0,-5; 0,0" dur="1s" repeatCount="indefinite"/>
      <text x="55" y="35" fill="#d4691a" font-family="monospace" font-size="20" font-weight="bold">┌|∵|┘
        <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.25;0.5;0.75;1" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
      </text>
      <text x="55" y="35" fill="#c45a10" font-family="monospace" font-size="20" font-weight="bold">└|∵|┐
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.25;0.5;0.75;1" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
      </text>
    </g>

    <!-- Note 2 -->
    <text x="145" y="13" fill="#e07020" font-size="14" font-family="sans-serif">♫
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="0.9s" begin="0.3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,2; 0,-8; 0,2" dur="1.8s" repeatCount="indefinite"/>
    </text>

    <!-- Dancer 2 -->
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 0,-5; 0,0" dur="1s" begin="0.25s" repeatCount="indefinite"/>
      <text x="165" y="35" fill="#d4691a" font-family="monospace" font-size="20" font-weight="bold">┌|∵|┘
        <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.25;0.5;0.75;1" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
      </text>
      <text x="165" y="35" fill="#c45a10" font-family="monospace" font-size="20" font-weight="bold">└|∵|┐
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.25;0.5;0.75;1" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
      </text>
    </g>

    <!-- Note 3 -->
    <text x="255" y="17" fill="#b85a15" font-size="13" font-family="sans-serif">♪
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-7; 0,0" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    </text>

    <!-- Dancer 3 -->
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 0,-5; 0,0" dur="1s" begin="0.5s" repeatCount="indefinite"/>
      <text x="275" y="35" fill="#d4691a" font-family="monospace" font-size="20" font-weight="bold">┌|∵|┘
        <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.25;0.5;0.75;1" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
      </text>
      <text x="275" y="35" fill="#c45a10" font-family="monospace" font-size="20" font-weight="bold">└|∵|┐
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.25;0.5;0.75;1" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
      </text>
    </g>

    <!-- Note 4 -->
    <text x="360" y="14" fill="#e07020" font-size="15" font-family="sans-serif">♫
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.1s" begin="0.9s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-5; 0,0" dur="1.1s" begin="0.9s" repeatCount="indefinite"/>
    </text>

    <!-- Dancer 4 -->
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 0,-5; 0,0" dur="1s" begin="0.75s" repeatCount="indefinite"/>
      <text x="380" y="35" fill="#d4691a" font-family="monospace" font-size="20" font-weight="bold">┌|∵|┘
        <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.25;0.5;0.75;1" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
      </text>
      <text x="380" y="35" fill="#c45a10" font-family="monospace" font-size="20" font-weight="bold">└|∵|┐
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.25;0.5;0.75;1" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
      </text>
    </g>

    <!-- Note 5 -->
    <text x="460" y="19" fill="#b85a15" font-size="14" font-family="sans-serif">♪
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.3s" begin="0.45s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-6; 0,0" dur="1.3s" begin="0.45s" repeatCount="indefinite"/>
    </text>
  </g>
</svg>
