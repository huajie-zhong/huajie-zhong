<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08090e"/>
      <stop offset="50%" style="stop-color:#0c0f1a"/>
      <stop offset="100%" style="stop-color:#080b14"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8cdd8"/>
      <stop offset="35%" style="stop-color:#e8ecf2"/>
      <stop offset="50%" style="stop-color:#ffffff"/>
      <stop offset="65%" style="stop-color:#e8ecf2"/>
      <stop offset="100%" style="stop-color:#c8cdd8"/>
      <animate attributeName="x1" values="-50%;50%;-50%" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="50%;150%;50%" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2a3a5c;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#3d5a8a;stop-opacity:0.5"/>
      <stop offset="50%" style="stop-color:#5a7ab0;stop-opacity:0.7"/>
      <stop offset="80%" style="stop-color:#3d5a8a;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#2a3a5c;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="subtitleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5a6a88"/>
      <stop offset="50%" style="stop-color:#8094b8"/>
      <stop offset="100%" style="stop-color:#5a6a88"/>
    </linearGradient>
    <filter id="nameGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#4a6a9a" flood-opacity="0.25" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Star sparkle -->
    <g id="sparkle">
      <line x1="-5" y1="0" x2="5" y2="0" stroke="#d0d8e8" stroke-width="1" stroke-linecap="round"/>
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#d0d8e8" stroke-width="1" stroke-linecap="round"/>
      <line x1="-3" y1="-3" x2="3" y2="3" stroke="#d0d8e8" stroke-width="0.7" stroke-linecap="round"/>
      <line x1="3" y1="-3" x2="-3" y2="3" stroke="#d0d8e8" stroke-width="0.7" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- Background -->
  <rect width="800" height="220" rx="0" fill="url(#bgGrad)"/>

  <!-- Floating particles — cool silver/blue -->
  <circle cx="120" cy="40" r="1.2" fill="#8098c0" opacity="0.25">
    <animate attributeName="cy" values="40;30;40" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.25;0.5;0.25" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="60" r="0.8" fill="#a0b4d0" opacity="0.2">
    <animate attributeName="cy" values="60;45;60" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.45;0.2" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="35" r="1" fill="#c0c8d8" opacity="0.2">
    <animate attributeName="cy" values="35;25;35" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="550" cy="50" r="0.7" fill="#7088b0" opacity="0.2">
    <animate attributeName="cy" values="50;38;50" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="180" r="0.9" fill="#a0b4d0" opacity="0.15">
    <animate attributeName="cy" values="180;168;180" dur="5.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.35;0.15" dur="5.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="170" r="1" fill="#8098c0" opacity="0.15">
    <animate attributeName="cy" values="170;160;170" dur="3.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.35;0.15" dur="3.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Sparkles — subtle silver -->
  <use href="#sparkle" x="140" y="55" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    <animateTransform attributeName="transform" type="scale" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite" begin="0.5s" additive="sum"/>
  </use>
  <use href="#sparkle" x="660" y="45" opacity="0">
    <animate attributeName="opacity" values="0;0.35;0" dur="4s" repeatCount="indefinite" begin="1.5s"/>
    <animateTransform attributeName="transform" type="scale" values="0.2;0.5;0.2" dur="4s" repeatCount="indefinite" begin="1.5s" additive="sum"/>
  </use>
  <use href="#sparkle" x="400" y="30" opacity="0">
    <animate attributeName="opacity" values="0;0.3;0" dur="3.5s" repeatCount="indefinite" begin="2s"/>
    <animateTransform attributeName="transform" type="scale" values="0.2;0.5;0.2" dur="3.5s" repeatCount="indefinite" begin="2s" additive="sum"/>
  </use>

  <!-- Decorative top line -->
  <rect x="100" y="28" width="600" height="1" fill="url(#lineGrad)" opacity="0.4"/>

  <!-- Vinyl record decorative element — left -->
  <g opacity="0.1">
    <circle cx="70" cy="110" r="45" fill="none" stroke="#5a7ab0" stroke-width="0.8"/>
    <circle cx="70" cy="110" r="35" fill="none" stroke="#4a6a9a" stroke-width="0.5"/>
    <circle cx="70" cy="110" r="25" fill="none" stroke="#3d5a8a" stroke-width="0.5"/>
    <circle cx="70" cy="110" r="8" fill="none" stroke="#5a7ab0" stroke-width="1"/>
    <circle cx="70" cy="110" r="3" fill="#5a7ab0"/>
    <animateTransform attributeName="transform" type="rotate" from="0 70 110" to="360 70 110" dur="20s" repeatCount="indefinite"/>
  </g>

  <!-- Vinyl record decorative element — right -->
  <g opacity="0.07">
    <circle cx="730" cy="110" r="45" fill="none" stroke="#8098c0" stroke-width="0.8"/>
    <circle cx="730" cy="110" r="35" fill="none" stroke="#7088b0" stroke-width="0.5"/>
    <circle cx="730" cy="110" r="25" fill="none" stroke="#6078a0" stroke-width="0.5"/>
    <circle cx="730" cy="110" r="8" fill="none" stroke="#8098c0" stroke-width="1"/>
    <circle cx="730" cy="110" r="3" fill="#8098c0"/>
    <animateTransform attributeName="transform" type="rotate" from="0 730 110" to="360 730 110" dur="25s" repeatCount="indefinite"/>
  </g>

  <!-- Main name -->
  <text x="400" y="105" font-family="'Georgia', 'Garamond', 'Times New Roman', serif" font-size="52" font-weight="700" fill="url(#nameGrad)" text-anchor="middle" letter-spacing="6" filter="url(#nameGlow)">
    HUAJIE ZHONG
  </text>

  <!-- Subtitle -->
  <text x="400" y="145" font-family="'Fira Code', 'Cascadia Code', monospace" font-size="15" fill="url(#subtitleGrad)" text-anchor="middle" letter-spacing="4" filter="url(#softGlow)">
    Full-Stack Developer  &#183;  Cornell University
  </text>

  <!-- Decorative bottom line -->
  <rect x="200" y="165" width="400" height="1" fill="url(#lineGrad)" opacity="0.5">
    <animate attributeName="width" values="0;400" dur="2s" fill="freeze"/>
    <animate attributeName="x" values="400;200" dur="2s" fill="freeze"/>
  </rect>

  <!-- Small tagline -->
  <text x="400" y="190" font-family="'Fira Code', monospace" font-size="11" fill="#3d4f6e" text-anchor="middle" letter-spacing="2">
    building things that matter
  </text>

</svg>