<svg xmlns="http://www.w3.org/2000/svg" width="800" height="260" viewBox="0 0 800 260">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0d14"/>
      <stop offset="40%" style="stop-color:#0e1320"/>
      <stop offset="100%" style="stop-color:#131a28"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b8b0cc"/>
      <stop offset="25%" style="stop-color:#e4e0ec"/>
      <stop offset="50%" style="stop-color:#ffffff"/>
      <stop offset="75%" style="stop-color:#e4e0ec"/>
      <stop offset="100%" style="stop-color:#b8b0cc"/>
      <animate attributeName="x1" values="-80%;20%;-80%" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="20%;120%;20%" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7b9ed4;stop-opacity:0"/>
      <stop offset="15%" style="stop-color:#7b9ed4;stop-opacity:0.2"/>
      <stop offset="50%" style="stop-color:#a89cc8;stop-opacity:0.5"/>
      <stop offset="85%" style="stop-color:#7b9ed4;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#7b9ed4;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="subtitleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7882a0"/>
      <stop offset="50%" style="stop-color:#a89cc8"/>
      <stop offset="100%" style="stop-color:#7882a0"/>
    </linearGradient>
    <linearGradient id="orbGradWarm" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e8c898;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#d4a87c;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="shootingTrail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4a87c;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#e4c8a0;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#fff8f0;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="nameGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#a89cc8" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="orbGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Diamond sparkle shape -->
    <g id="diamond">
      <path d="M0,-6 L2,0 0,6 -2,0 Z" fill="#e4e0ec" opacity="0.8"/>
      <path d="M-4,0 L0,-1.5 4,0 0,1.5 Z" fill="#e4e0ec" opacity="0.5"/>
    </g>
  </defs>

  <!-- Background -->
  <rect width="800" height="260" fill="url(#bgGrad)"/>

  <!-- Starfield — scattered twinkling dots -->
  <circle cx="32" cy="18" r="0.8" fill="#e4e0ec" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="3.1s" repeatCount="indefinite"/></circle>
  <circle cx="95" cy="52" r="0.5" fill="#a89cc8" opacity="0.3"><animate attributeName="opacity" values="0.3;0.08;0.3" dur="4.3s" repeatCount="indefinite" begin="0.6s"/></circle>
  <circle cx="155" cy="14" r="0.7" fill="#92b4e0" opacity="0.35"><animate attributeName="opacity" values="0.35;0.08;0.35" dur="3.7s" repeatCount="indefinite" begin="1.1s"/></circle>
  <circle cx="230" cy="40" r="0.4" fill="#d4a87c" opacity="0.3"><animate attributeName="opacity" values="0.3;0.06;0.3" dur="5.2s" repeatCount="indefinite" begin="0.3s"/></circle>
  <circle cx="310" cy="22" r="0.9" fill="#a89cc8" opacity="0.35"><animate attributeName="opacity" values="0.35;0.1;0.35" dur="3.4s" repeatCount="indefinite" begin="1.8s"/></circle>
  <circle cx="415" cy="16" r="0.6" fill="#e4e0ec" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="4.1s" repeatCount="indefinite" begin="0.9s"/></circle>
  <circle cx="500" cy="38" r="0.5" fill="#7b9ed4" opacity="0.3"><animate attributeName="opacity" values="0.3;0.06;0.3" dur="5s" repeatCount="indefinite" begin="2.1s"/></circle>
  <circle cx="570" cy="12" r="0.8" fill="#d4a87c" opacity="0.3"><animate attributeName="opacity" values="0.3;0.08;0.3" dur="3.9s" repeatCount="indefinite" begin="0.4s"/></circle>
  <circle cx="640" cy="45" r="0.6" fill="#92b4e0" opacity="0.35"><animate attributeName="opacity" values="0.35;0.08;0.35" dur="4.5s" repeatCount="indefinite" begin="1.4s"/></circle>
  <circle cx="720" cy="20" r="0.7" fill="#a89cc8" opacity="0.3"><animate attributeName="opacity" values="0.3;0.08;0.3" dur="3.6s" repeatCount="indefinite" begin="2.5s"/></circle>
  <circle cx="775" cy="50" r="0.5" fill="#e4e0ec" opacity="0.3"><animate attributeName="opacity" values="0.3;0.06;0.3" dur="4.8s" repeatCount="indefinite" begin="0.7s"/></circle>
  <!-- Lower stars -->
  <circle cx="60" cy="210" r="0.5" fill="#92b4e0" opacity="0.25"><animate attributeName="opacity" values="0.25;0.06;0.25" dur="4.6s" repeatCount="indefinite" begin="1.2s"/></circle>
  <circle cx="190" cy="230" r="0.6" fill="#a89cc8" opacity="0.2"><animate attributeName="opacity" values="0.2;0.05;0.2" dur="5.1s" repeatCount="indefinite" begin="0.5s"/></circle>
  <circle cx="380" cy="245" r="0.7" fill="#d4a87c" opacity="0.2"><animate attributeName="opacity" values="0.2;0.05;0.2" dur="3.8s" repeatCount="indefinite" begin="1.7s"/></circle>
  <circle cx="550" cy="235" r="0.5" fill="#7b9ed4" opacity="0.2"><animate attributeName="opacity" values="0.2;0.04;0.2" dur="4.4s" repeatCount="indefinite" begin="2.3s"/></circle>
  <circle cx="700" cy="220" r="0.6" fill="#e4e0ec" opacity="0.25"><animate attributeName="opacity" values="0.25;0.06;0.25" dur="3.5s" repeatCount="indefinite" begin="0.8s"/></circle>
  <circle cx="770" cy="240" r="0.4" fill="#a89cc8" opacity="0.2"><animate attributeName="opacity" values="0.2;0.05;0.2" dur="5.5s" repeatCount="indefinite" begin="1.9s"/></circle>

  <!-- Floating Clannad light orbs — warm, dreamy -->
  <circle cx="90" cy="70" r="6" fill="#d4a87c" opacity="0" filter="url(#orbGlow)">
    <animate attributeName="opacity" values="0;0.18;0.08;0.2;0" dur="8s" repeatCount="indefinite" begin="0s"/>
    <animate attributeName="cy" values="70;58;65;55;70" dur="8s" repeatCount="indefinite" begin="0s"/>
    <animate attributeName="r" values="6;7;5;7;6" dur="8s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle cx="710" cy="65" r="5" fill="#e4c8a0" opacity="0" filter="url(#orbGlow)">
    <animate attributeName="opacity" values="0;0.15;0.06;0.17;0" dur="9s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="cy" values="65;54;60;50;65" dur="9s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="r" values="5;6;4.5;6.5;5" dur="9s" repeatCount="indefinite" begin="2s"/>
  </circle>
  <circle cx="400" cy="30" r="4" fill="#92b4e0" opacity="0" filter="url(#orbGlow)">
    <animate attributeName="opacity" values="0;0.12;0.05;0.14;0" dur="7s" repeatCount="indefinite" begin="4s"/>
    <animate attributeName="cy" values="30;22;28;20;30" dur="7s" repeatCount="indefinite" begin="4s"/>
  </circle>
  <circle cx="250" cy="200" r="4.5" fill="#d4a87c" opacity="0" filter="url(#orbGlow)">
    <animate attributeName="opacity" values="0;0.12;0.04;0.13;0" dur="8.5s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="cy" values="200;190;196;186;200" dur="8.5s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="600" cy="210" r="3.5" fill="#a89cc8" opacity="0" filter="url(#orbGlow)">
    <animate attributeName="opacity" values="0;0.1;0.04;0.12;0" dur="7.5s" repeatCount="indefinite" begin="3s"/>
    <animate attributeName="cy" values="210;202;208;198;210" dur="7.5s" repeatCount="indefinite" begin="3s"/>
  </circle>

  <!-- Diamond sparkles -->
  <use href="#diamond" x="160" y="50" opacity="0" transform="scale(0.5)">
    <animate attributeName="opacity" values="0;0.5;0" dur="4s" repeatCount="indefinite" begin="1s"/>
    <animateTransform attributeName="transform" type="rotate" values="0;15;0" dur="4s" repeatCount="indefinite" begin="1s" additive="sum"/>
  </use>
  <use href="#diamond" x="640" y="40" opacity="0" transform="scale(0.4)">
    <animate attributeName="opacity" values="0;0.4;0" dur="5s" repeatCount="indefinite" begin="2.5s"/>
    <animateTransform attributeName="transform" type="rotate" values="0;-10;0" dur="5s" repeatCount="indefinite" begin="2.5s" additive="sum"/>
  </use>
  <use href="#diamond" x="450" y="25" opacity="0" transform="scale(0.35)">
    <animate attributeName="opacity" values="0;0.35;0" dur="3.5s" repeatCount="indefinite" begin="4s"/>
  </use>

  <!-- Shooting star -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0.9;0.7;0" dur="10s" repeatCount="indefinite" keyTimes="0;0.06;0.09;0.14;0.20"/>
    <animateTransform attributeName="transform" type="translate" values="-60,-30;-60,-30;180,40;480,90;820,170" dur="10s" repeatCount="indefinite" keyTimes="0;0.06;0.09;0.14;0.20"/>
    <line x1="-45" y1="-22" x2="0" y2="0" stroke="url(#shootingTrail)" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="1.5" fill="#fff8f0" filter="url(#starGlow)"/>
  </g>
  <!-- Second shooting star, offset timing -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0.7;0.5;0" dur="10s" repeatCount="indefinite" keyTimes="0;0.56;0.59;0.64;0.70"/>
    <animateTransform attributeName="transform" type="translate" values="850,-10;850,-10;620,45;350,100;-40,180" dur="10s" repeatCount="indefinite" keyTimes="0;0.56;0.59;0.64;0.70"/>
    <line x1="40" y1="-18" x2="0" y2="0" stroke="url(#shootingTrail)" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="1.2" fill="#fff8f0" filter="url(#starGlow)"/>
  </g>

  <!-- Decorative top line -->
  <rect x="80" y="55" width="640" height="1" fill="url(#accentLine)" opacity="0.5"/>

  <!-- Decorative corner accents -->
  <path d="M30,30 L30,50 M30,30 L50,30" stroke="#a89cc8" stroke-width="0.8" opacity="0.2" stroke-linecap="round"/>
  <path d="M770,30 L770,50 M770,30 L750,30" stroke="#a89cc8" stroke-width="0.8" opacity="0.2" stroke-linecap="round"/>
  <path d="M30,230 L30,210 M30,230 L50,230" stroke="#7b9ed4" stroke-width="0.8" opacity="0.15" stroke-linecap="round"/>
  <path d="M770,230 L770,210 M770,230 L750,230" stroke="#7b9ed4" stroke-width="0.8" opacity="0.15" stroke-linecap="round"/>

  <!-- Main name — Palatino for elegance -->
  <text x="400" y="120" font-family="'Palatino Linotype', 'Book Antiqua', Palatino, 'Didot', 'Bodoni MT', Georgia, serif" font-size="56" font-weight="400" fill="url(#nameGrad)" text-anchor="middle" letter-spacing="12" filter="url(#nameGlow)">
    HUAJIE ZHONG
  </text>

  <!-- Decorative mid line with lavender glow -->
  <rect x="240" y="138" width="320" height="1" fill="url(#accentLine)" opacity="0.6">
    <animate attributeName="width" values="0;320" dur="1.8s" fill="freeze"/>
    <animate attributeName="x" values="400;240" dur="1.8s" fill="freeze"/>
  </rect>

  <!-- Subtitle -->
  <text x="400" y="168" font-family="'Fira Code', 'Cascadia Code', 'Consolas', monospace" font-size="13" fill="url(#subtitleGrad)" text-anchor="middle" letter-spacing="5" filter="url(#softGlow)">
    FULL-STACK DEVELOPER  &#183;  CORNELL UNIVERSITY
  </text>

  <!-- Small decorative dots flanking subtitle -->
  <circle cx="210" cy="164" r="1.5" fill="#a89cc8" opacity="0.3"/>
  <circle cx="590" cy="164" r="1.5" fill="#a89cc8" opacity="0.3"/>

  <!-- Tagline -->
  <text x="400" y="205" font-family="'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif" font-size="13" font-style="italic" fill="#7882a0" text-anchor="middle" letter-spacing="1" opacity="0.7">
    building things that matter
  </text>

  <!-- Bottom decorative line -->
  <rect x="80" y="225" width="640" height="1" fill="url(#accentLine)" opacity="0.3"/>
</svg>