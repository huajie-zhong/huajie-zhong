<svg xmlns="http://www.w3.org/2000/svg" width="800" height="210" viewBox="0 0 800 210">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e1118"/>
      <stop offset="100%" style="stop-color:#131a24"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b9ed4;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#a89cc8;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7b9ed4;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="barGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7b9ed4"/>
      <stop offset="100%" style="stop-color:#a89cc8"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a89cc8"/>
      <stop offset="100%" style="stop-color:#d4a87c"/>
    </linearGradient>
    <linearGradient id="barGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#92b4e0"/>
      <stop offset="100%" style="stop-color:#7b9ed4"/>
    </linearGradient>
    <linearGradient id="heartbeatLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a89cc8;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#a89cc8;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#a89cc8;stop-opacity:0"/>
    </linearGradient>
    <filter id="orbGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Controller icon -->
    <g id="iconController">
      <rect x="-8" y="-4" width="16" height="9" rx="3" fill="none" stroke="#7b9ed4" stroke-width="1.2"/>
      <circle cx="-3.5" cy="-0.5" r="1" fill="#7b9ed4"/>
      <circle cx="3.5" cy="-0.5" r="1" fill="#a89cc8"/>
      <line x1="-5" y1="5" x2="-3" y2="8" stroke="#7b9ed4" stroke-width="1" stroke-linecap="round"/>
      <line x1="5" y1="5" x2="3" y2="8" stroke="#7b9ed4" stroke-width="1" stroke-linecap="round"/>
    </g>
    <!-- Pan icon -->
    <g id="iconPan">
      <ellipse cx="0" cy="0" rx="7" ry="3" fill="none" stroke="#d4a87c" stroke-width="1.2"/>
      <line x1="7" y1="0" x2="14" y2="-2" stroke="#d4a87c" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Steam lines -->
      <path d="M-2,-4 C-2,-7 0,-6 0,-9" fill="none" stroke="#d4a87c" stroke-width="0.7" opacity="0.5">
        <animate attributeName="opacity" values="0.5;0.15;0.5" dur="2s" repeatCount="indefinite"/>
      </path>
      <path d="M2,-4 C2,-8 4,-6 4,-10" fill="none" stroke="#d4a87c" stroke-width="0.7" opacity="0.4">
        <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.3s" repeatCount="indefinite" begin="0.3s"/>
      </path>
    </g>
    <!-- Headphones icon -->
    <g id="iconHeadphones">
      <path d="M-7,2 C-7,-5 7,-5 7,2" fill="none" stroke="#a89cc8" stroke-width="1.2"/>
      <rect x="-9" y="0" width="4" height="6" rx="1.5" fill="none" stroke="#a89cc8" stroke-width="1"/>
      <rect x="5" y="0" width="4" height="6" rx="1.5" fill="none" stroke="#a89cc8" stroke-width="1"/>
      <!-- Sound waves -->
      <path d="M-1,1 C-0.5,-1 0.5,3 1,1" stroke="#a89cc8" stroke-width="0.6" fill="none" opacity="0.4">
        <animate attributeName="opacity" values="0.4;0.15;0.4" dur="1.5s" repeatCount="indefinite"/>
      </path>
    </g>
    <!-- Heart icon (for anime) -->
    <g id="iconHeart">
      <path d="M0,3 C-3,0 -6,-2 -5,-5 C-4,-7 -1,-7 0,-4 C1,-7 4,-7 5,-5 C6,-2 3,0 0,3Z" fill="none" stroke="#e88090" stroke-width="1"/>
      <path d="M0,3 C-3,0 -6,-2 -5,-5 C-4,-7 -1,-7 0,-4 C1,-7 4,-7 5,-5 C6,-2 3,0 0,3Z" fill="#e88090" opacity="0.15">
        <animate attributeName="opacity" values="0.15;0.3;0.15" dur="1.2s" repeatCount="indefinite"/>
      </path>
    </g>
    <!-- Moon icon -->
    <g id="iconMoon">
      <path d="M5.5,-4.3 A7,7 0 1,0 5.5,4.3 A5,5 0 0,0 5.5,-4.3Z" fill="none" stroke="#92b4e0" stroke-width="1.2" stroke-linejoin="round"/>
      <circle cx="-3" cy="-5" r="0.7" fill="#92b4e0" opacity="0.5">
        <animate attributeName="opacity" values="0.5;0.15;0.5" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-6" cy="1" r="0.5" fill="#92b4e0" opacity="0.4">
        <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite" begin="0.7s"/>
      </circle>
    </g>
    <!-- Graduation cap -->
    <g id="iconCap">
      <polygon points="0,-5 10,0 0,3 -10,0" fill="none" stroke="#92b4e0" stroke-width="1"/>
      <line x1="0" y1="3" x2="0" y2="7" stroke="#92b4e0" stroke-width="0.8"/>
      <circle cx="0" cy="8" r="1" fill="#92b4e0" opacity="0.5"/>
    </g>
  </defs>

  <!-- Card background -->
  <rect x="10" y="10" width="780" height="190" rx="12" fill="url(#bgGrad)"/>
  <rect x="10" y="10" width="780" height="190" rx="12" fill="none" stroke="url(#borderGrad)" stroke-width="1"/>

  <!-- Corner ornaments -->
  <path d="M18,18 L18,34 M18,18 L34,18" stroke="#a89cc8" stroke-width="1" opacity="0.25" stroke-linecap="round"/>
  <path d="M782,18 L782,34 M782,18 L766,18" stroke="#a89cc8" stroke-width="1" opacity="0.25" stroke-linecap="round"/>
  <path d="M18,192 L18,176 M18,192 L34,192" stroke="#7b9ed4" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
  <path d="M782,192 L782,176 M782,192 L766,192" stroke="#7b9ed4" stroke-width="1" opacity="0.2" stroke-linecap="round"/>

  <!-- Heartbeat/waveform line running across the card -->
  <path d="M30,106 L180,106 L190,91 L200,121 L210,96 L220,114 L230,106 L770,106" fill="none" stroke="url(#heartbeatLine)" stroke-width="0.8">
    <animate attributeName="stroke-dashoffset" values="0;-20" dur="2s" repeatCount="indefinite"/>
  </path>

  <!-- Row 1: Developer + Controller -->
  <use href="#iconController" x="42" y="48" filter="url(#iconGlow)"/>
  <text x="68" y="52" font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif" font-size="15" fill="#e4e0ec" opacity="0.9">Full-stack developer</text>
  <!-- Skill bar visualization -->
  <rect x="250" y="44" width="180" height="4" rx="2" fill="#1a2030" opacity="0.5"/>
  <rect x="250" y="44" width="0" height="4" rx="2" fill="url(#barGrad1)" opacity="0.7">
    <animate attributeName="width" values="0;155" dur="1.5s" fill="freeze" begin="0.3s"/>
  </rect>
  <text x="440" y="52" font-family="'Fira Code', monospace" font-size="12" fill="#7b9ed4" opacity="0.5">full stack delveoper</text>

  <!-- Row 3: Cooking -->
  <use href="#iconPan" x="42" y="82" filter="url(#iconGlow)"/>
  <text x="68" y="86" font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif" font-size="15" fill="#c0bcd4" opacity="0.75">Kitchen experimenter</text>
  <text x="250" y="86" font-family="'Fira Code', monospace" font-size="12" fill="#d4a87c" opacity="0.4">treats the kitchen like a lab</text>

  <!-- Horizontal separator -->
  <line x1="40" y1="106" x2="760" y2="106" stroke="#a89cc8" stroke-width="0.5" opacity="0.1"/>

  <!-- Row 4: Music -->
  <use href="#iconHeadphones" x="42" y="130" filter="url(#iconGlow)"/>
  <text x="68" y="134" font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif" font-size="15" fill="#b0acc8" opacity="0.7">Always listening</text>
  <!-- Mini waveform bars -->
  <g transform="translate(250, 124)">
    <rect x="0" y="2" width="3" height="8" rx="1" fill="#a89cc8" opacity="0.4">
      <animate attributeName="height" values="8;4;10;6;8" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="2;4;1;3;2" dur="1.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="5" y="0" width="3" height="12" rx="1" fill="#7b9ed4" opacity="0.4">
      <animate attributeName="height" values="12;6;14;8;12" dur="1.5s" repeatCount="indefinite" begin="0.1s"/>
      <animate attributeName="y" values="0;3;-1;2;0" dur="1.5s" repeatCount="indefinite" begin="0.1s"/>
    </rect>
    <rect x="10" y="3" width="3" height="6" rx="1" fill="#a89cc8" opacity="0.4">
      <animate attributeName="height" values="6;10;4;8;6" dur="1.3s" repeatCount="indefinite" begin="0.2s"/>
      <animate attributeName="y" values="3;1;4;2;3" dur="1.3s" repeatCount="indefinite" begin="0.2s"/>
    </rect>
    <rect x="15" y="1" width="3" height="10" rx="1" fill="#92b4e0" opacity="0.4">
      <animate attributeName="height" values="10;4;12;6;10" dur="1.4s" repeatCount="indefinite" begin="0.15s"/>
      <animate attributeName="y" values="1;4;0;3;1" dur="1.4s" repeatCount="indefinite" begin="0.15s"/>
    </rect>
    <rect x="20" y="2" width="3" height="8" rx="1" fill="#7b9ed4" opacity="0.35">
      <animate attributeName="height" values="8;12;6;10;8" dur="1.1s" repeatCount="indefinite" begin="0.3s"/>
      <animate attributeName="y" values="2;0;3;1;2" dur="1.1s" repeatCount="indefinite" begin="0.3s"/>
    </rect>
  </g>
  <text x="280" y="134" font-family="'Fira Code', monospace" font-size="12" fill="#a89cc8" opacity="0.4">Roselia · HOYO-MIX · Jay Chou</text>

  <!-- Row 5: Night owl -->
  <use href="#iconMoon" x="42" y="164" filter="url(#iconGlow)"/>
  <text x="68" y="168" font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif" font-size="15" fill="#a0aec8" opacity="0.7">Debugging past midnight</text>
  <text x="250" y="168" font-family="'Fira Code', monospace" font-size="12" fill="#92b4e0" opacity="0.4">git commit -m "fix: 3am edition"</text>

  <!-- Floating orb decorations -->
  <circle cx="750" cy="180" r="3" fill="#d4a87c" opacity="0" filter="url(#orbGlow)">
    <animate attributeName="opacity" values="0;0.2;0" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="180;174;180" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="720" cy="30" r="2.5" fill="#a89cc8" opacity="0" filter="url(#orbGlow)">
    <animate attributeName="opacity" values="0;0.15;0" dur="7s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="cy" values="30;25;30" dur="7s" repeatCount="indefinite" begin="2s"/>
  </circle>
  <circle cx="35" cy="180" r="2" fill="#92b4e0" opacity="0" filter="url(#orbGlow)">
    <animate attributeName="opacity" values="0;0.12;0" dur="5.5s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="cy" values="180;175;180" dur="5.5s" repeatCount="indefinite" begin="1s"/>
  </circle>
</svg>