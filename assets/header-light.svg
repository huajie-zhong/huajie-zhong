<svg xmlns="http://www.w3.org/2000/svg" width="800" height="260" viewBox="0 0 800 260">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f4f0"/>
      <stop offset="40%" style="stop-color:#f2ece6"/>
      <stop offset="100%" style="stop-color:#ece5de"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5a5070"/>
      <stop offset="25%" style="stop-color:#3a3450"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="75%" style="stop-color:#3a3450"/>
      <stop offset="100%" style="stop-color:#5a5070"/>
      <animate attributeName="x1" values="-80%;20%;-80%" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="20%;120%;20%" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5a7caa;stop-opacity:0"/>
      <stop offset="15%" style="stop-color:#5a7caa;stop-opacity:0.15"/>
      <stop offset="50%" style="stop-color:#8070a0;stop-opacity:0.35"/>
      <stop offset="85%" style="stop-color:#5a7caa;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#5a7caa;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="subtitleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8a8298"/>
      <stop offset="50%" style="stop-color:#6a6080"/>
      <stop offset="100%" style="stop-color:#8a8298"/>
    </linearGradient>
    <linearGradient id="shootingTrail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8070a0;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#5a7caa;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#5a7caa;stop-opacity:0.6"/>
    </linearGradient>
    <filter id="nameGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#8070a0" flood-opacity="0.08" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="orbGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <g id="diamond">
      <path d="M0,-6 L2,0 0,6 -2,0 Z" fill="#5a7caa" opacity="0.6"/>
      <path d="M-4,0 L0,-1.5 4,0 0,1.5 Z" fill="#5a7caa" opacity="0.3"/>
    </g>
  </defs>

  <!-- Background -->
  <rect width="800" height="260" fill="url(#bgGrad)"/>

  <!-- Starfield — subtle dots on warm bg -->
  <circle cx="32" cy="18" r="0.6" fill="#5a7caa" opacity="0.2"><animate attributeName="opacity" values="0.2;0.05;0.2" dur="3.1s" repeatCount="indefinite"/></circle>
  <circle cx="95" cy="52" r="0.4" fill="#8070a0" opacity="0.15"><animate attributeName="opacity" values="0.15;0.04;0.15" dur="4.3s" repeatCount="indefinite" begin="0.6s"/></circle>
  <circle cx="155" cy="14" r="0.5" fill="#5a7caa" opacity="0.18"><animate attributeName="opacity" values="0.18;0.04;0.18" dur="3.7s" repeatCount="indefinite" begin="1.1s"/></circle>
  <circle cx="310" cy="22" r="0.7" fill="#8070a0" opacity="0.18"><animate attributeName="opacity" values="0.18;0.05;0.18" dur="3.4s" repeatCount="indefinite" begin="1.8s"/></circle>
  <circle cx="415" cy="16" r="0.5" fill="#5a7caa" opacity="0.2"><animate attributeName="opacity" values="0.2;0.05;0.2" dur="4.1s" repeatCount="indefinite" begin="0.9s"/></circle>
  <circle cx="570" cy="12" r="0.6" fill="#8070a0" opacity="0.15"><animate attributeName="opacity" values="0.15;0.04;0.15" dur="3.9s" repeatCount="indefinite" begin="0.4s"/></circle>
  <circle cx="640" cy="45" r="0.5" fill="#5a7caa" opacity="0.18"><animate attributeName="opacity" values="0.18;0.04;0.18" dur="4.5s" repeatCount="indefinite" begin="1.4s"/></circle>
  <circle cx="720" cy="20" r="0.5" fill="#8070a0" opacity="0.15"><animate attributeName="opacity" values="0.15;0.04;0.15" dur="3.6s" repeatCount="indefinite" begin="2.5s"/></circle>
  <!-- Lower stars -->
  <circle cx="60" cy="210" r="0.4" fill="#5a7caa" opacity="0.12"><animate attributeName="opacity" values="0.12;0.03;0.12" dur="4.6s" repeatCount="indefinite" begin="1.2s"/></circle>
  <circle cx="380" cy="245" r="0.5" fill="#8070a0" opacity="0.1"><animate attributeName="opacity" values="0.1;0.03;0.1" dur="3.8s" repeatCount="indefinite" begin="1.7s"/></circle>
  <circle cx="700" cy="220" r="0.5" fill="#5a7caa" opacity="0.12"><animate attributeName="opacity" values="0.12;0.03;0.12" dur="3.5s" repeatCount="indefinite" begin="0.8s"/></circle>

  <!-- Floating orbs — blue-lavender on light bg -->
  <circle cx="90" cy="70" r="6" fill="#5a7caa" opacity="0" filter="url(#orbGlow)">
    <animate attributeName="opacity" values="0;0.1;0.04;0.11;0" dur="8s" repeatCount="indefinite" begin="0s"/>
    <animate attributeName="cy" values="70;58;65;55;70" dur="8s" repeatCount="indefinite" begin="0s"/>
    <animate attributeName="r" values="6;7;5;7;6" dur="8s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle cx="710" cy="65" r="5" fill="#8070a0" opacity="0" filter="url(#orbGlow)">
    <animate attributeName="opacity" values="0;0.08;0.03;0.09;0" dur="9s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="cy" values="65;54;60;50;65" dur="9s" repeatCount="indefinite" begin="2s"/>
  </circle>
  <circle cx="400" cy="30" r="4" fill="#5a7caa" opacity="0" filter="url(#orbGlow)">
    <animate attributeName="opacity" values="0;0.07;0.03;0.08;0" dur="7s" repeatCount="indefinite" begin="4s"/>
    <animate attributeName="cy" values="30;22;28;20;30" dur="7s" repeatCount="indefinite" begin="4s"/>
  </circle>
  <circle cx="250" cy="200" r="4.5" fill="#8070a0" opacity="0" filter="url(#orbGlow)">
    <animate attributeName="opacity" values="0;0.07;0.02;0.08;0" dur="8.5s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="cy" values="200;190;196;186;200" dur="8.5s" repeatCount="indefinite" begin="1s"/>
  </circle>

  <!-- Diamond sparkles -->
  <use href="#diamond" x="160" y="50" opacity="0" transform="scale(0.4)">
    <animate attributeName="opacity" values="0;0.35;0" dur="4s" repeatCount="indefinite" begin="1s"/>
  </use>
  <use href="#diamond" x="640" y="40" opacity="0" transform="scale(0.35)">
    <animate attributeName="opacity" values="0;0.3;0" dur="5s" repeatCount="indefinite" begin="2.5s"/>
  </use>

  <!-- Shooting star -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0.6;0.4;0" dur="10s" repeatCount="indefinite" keyTimes="0;0.06;0.09;0.14;0.20"/>
    <animateTransform attributeName="transform" type="translate" values="-60,-30;-60,-30;180,40;480,90;820,170" dur="10s" repeatCount="indefinite" keyTimes="0;0.06;0.09;0.14;0.20"/>
    <line x1="-45" y1="-22" x2="0" y2="0" stroke="url(#shootingTrail)" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="1.5" fill="#5a7caa" filter="url(#starGlow)"/>
  </g>

  <!-- Corner accents -->
  <path d="M30,30 L30,50 M30,30 L50,30" stroke="#8070a0" stroke-width="0.8" opacity="0.15" stroke-linecap="round"/>
  <path d="M770,30 L770,50 M770,30 L750,30" stroke="#8070a0" stroke-width="0.8" opacity="0.15" stroke-linecap="round"/>
  <path d="M30,230 L30,210 M30,230 L50,230" stroke="#5a7caa" stroke-width="0.8" opacity="0.1" stroke-linecap="round"/>
  <path d="M770,230 L770,210 M770,230 L750,230" stroke="#5a7caa" stroke-width="0.8" opacity="0.1" stroke-linecap="round"/>

  <!-- Top accent line -->
  <rect x="80" y="55" width="640" height="1" fill="url(#accentLine)" opacity="0.5"/>

  <!-- Main name -->
  <text x="400" y="120" font-family="'Palatino Linotype', 'Book Antiqua', Palatino, 'Didot', 'Bodoni MT', Georgia, serif" font-size="56" font-weight="400" fill="url(#nameGrad)" text-anchor="middle" letter-spacing="12" filter="url(#nameGlow)">
    HUAJIE ZHONG
  </text>

  <!-- Mid line -->
  <rect x="240" y="138" width="320" height="1" fill="url(#accentLine)" opacity="0.6">
    <animate attributeName="width" values="0;320" dur="1.8s" fill="freeze"/>
    <animate attributeName="x" values="400;240" dur="1.8s" fill="freeze"/>
  </rect>

  <!-- Subtitle -->
  <text x="400" y="168" font-family="'Fira Code', 'Cascadia Code', 'Consolas', monospace" font-size="13" fill="url(#subtitleGrad)" text-anchor="middle" letter-spacing="5" filter="url(#softGlow)">
    FULL-STACK DEVELOPER  &#183;  CORNELL UNIVERSITY
  </text>

  <!-- Flanking dots -->
  <circle cx="210" cy="164" r="1.5" fill="#8070a0" opacity="0.2"/>
  <circle cx="590" cy="164" r="1.5" fill="#8070a0" opacity="0.2"/>

  <!-- Tagline -->
  <text x="400" y="205" font-family="'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif" font-size="13" font-style="italic" fill="#8a8298" text-anchor="middle" letter-spacing="1" opacity="0.6">
    building things that matter
  </text>

  <!-- Bottom line -->
  <rect x="80" y="225" width="640" height="1" fill="url(#accentLine)" opacity="0.3"/>
</svg>