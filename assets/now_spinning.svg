<svg xmlns="http://www.w3.org/2000/svg" width="500" height="50" viewBox="0 0 500 50">
  <defs>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8cdd8"/>
      <stop offset="100%" style="stop-color:#8098c0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Vinyl icon spinning -->
  <g>
    <circle cx="22" cy="25" r="12" fill="none" stroke="#5a7ab0" stroke-width="1" opacity="0.4"/>
    <circle cx="22" cy="25" r="7" fill="none" stroke="#4a6a9a" stroke-width="0.5" opacity="0.3"/>
    <circle cx="22" cy="25" r="2.5" fill="#8098c0" opacity="0.5"/>
    <animateTransform attributeName="transform" type="rotate" from="0 22 25" to="360 22 25" dur="4s" repeatCount="indefinite"/>
  </g>

  <!-- Title text -->
  <text x="45" y="30" font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif" font-size="20" font-weight="700" fill="url(#titleGrad)" letter-spacing="1">Now Spinning</text>

  <!-- Animated waveform bars — deep blue to silver gradient -->
  <g filter="url(#glow)" transform="translate(250, 0)">
    <rect x="0" y="15" width="4" height="20" rx="2" fill="#3d5a8a" opacity="0.7">
      <animate attributeName="height" values="20;8;22;12;20" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="15;21;14;19;15" dur="1.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="8" y="10" width="4" height="30" rx="2" fill="#4a6a9a" opacity="0.7">
      <animate attributeName="height" values="30;14;28;18;30" dur="1.5s" repeatCount="indefinite" begin="0.1s"/>
      <animate attributeName="y" values="10;18;11;16;10" dur="1.5s" repeatCount="indefinite" begin="0.1s"/>
    </rect>
    <rect x="16" y="18" width="4" height="14" rx="2" fill="#5a7ab0" opacity="0.7">
      <animate attributeName="height" values="14;24;10;20;14" dur="1.3s" repeatCount="indefinite" begin="0.2s"/>
      <animate attributeName="y" values="18;13;20;15;18" dur="1.3s" repeatCount="indefinite" begin="0.2s"/>
    </rect>
    <rect x="24" y="8" width="4" height="34" rx="2" fill="#6888b0" opacity="0.7">
      <animate attributeName="height" values="34;16;30;20;34" dur="1.6s" repeatCount="indefinite" begin="0.15s"/>
      <animate attributeName="y" values="8;17;10;15;8" dur="1.6s" repeatCount="indefinite" begin="0.15s"/>
    </rect>
    <rect x="32" y="12" width="4" height="26" rx="2" fill="#7898c0" opacity="0.65">
      <animate attributeName="height" values="26;10;28;14;26" dur="1.1s" repeatCount="indefinite" begin="0.3s"/>
      <animate attributeName="y" values="12;20;11;18;12" dur="1.1s" repeatCount="indefinite" begin="0.3s"/>
    </rect>
    <rect x="40" y="16" width="4" height="18" rx="2" fill="#8098c0" opacity="0.6">
      <animate attributeName="height" values="18;28;12;24;18" dur="1.4s" repeatCount="indefinite" begin="0.25s"/>
      <animate attributeName="y" values="16;11;19;13;16" dur="1.4s" repeatCount="indefinite" begin="0.25s"/>
    </rect>
    <rect x="48" y="14" width="4" height="22" rx="2" fill="#90a8c8" opacity="0.55">
      <animate attributeName="height" values="22;8;26;14;22" dur="1.7s" repeatCount="indefinite" begin="0.05s"/>
      <animate attributeName="y" values="14;21;12;18;14" dur="1.7s" repeatCount="indefinite" begin="0.05s"/>
    </rect>
    <rect x="56" y="10" width="4" height="30" rx="2" fill="#a0b4d0" opacity="0.45">
      <animate attributeName="height" values="30;18;32;12;30" dur="1.3s" repeatCount="indefinite" begin="0.35s"/>
      <animate attributeName="y" values="10;16;9;19;10" dur="1.3s" repeatCount="indefinite" begin="0.35s"/>
    </rect>
    <rect x="64" y="17" width="4" height="16" rx="2" fill="#b0c0d8" opacity="0.35">
      <animate attributeName="height" values="16;24;10;22;16" dur="1.5s" repeatCount="indefinite" begin="0.4s"/>
      <animate attributeName="y" values="17;13;20;14;17" dur="1.5s" repeatCount="indefinite" begin="0.4s"/>
    </rect>
    <rect x="72" y="20" width="4" height="10" rx="2" fill="#c0c8d8" opacity="0.25">
      <animate attributeName="height" values="10;18;6;14;10" dur="1.2s" repeatCount="indefinite" begin="0.2s"/>
      <animate attributeName="y" values="20;16;22;18;20" dur="1.2s" repeatCount="indefinite" begin="0.2s"/>
    </rect>
  </g>
</svg>
